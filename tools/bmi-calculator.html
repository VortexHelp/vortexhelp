<section class="hero">

<h1>BMI Calculator</h1>

<p>

Calculate your Body Mass Index (BMI) instantly using your height and weight.

</p>

<div class="calculator-box">

<label>Height (cm)</label>

<input
type="number"
id="height"
placeholder="Enter your height">

<label>Weight (kg)</label>

<input
type="number"
id="weight"
placeholder="Enter your weight">

<button class="btn" onclick="calculateBMI()">

Calculate BMI

</button>

<button class="tool-btn" onclick="resetBMI()">

Reset

</button>

<h2 id="result"></h2>

<p id="status"></p>
