<h1>Image to PDF</h1>

<p>

Convert JPG, PNG and WEBP images into high-quality PDF documents.

</p>

<div class="calculator-box">

<label>Select Image(s)</label>

<input
type="file"
id="imageInput"
accept="image/png,image/jpeg,image/webp"
multiple>

<br><br>

<div id="previewContainer"></div>

<br>

<button
class="btn"
onclick="createPDF()">

Create PDF

</button>

<button
class="tool-btn"
onclick="resetPDFTool()">

Reset

</button>

<br><br>

<a
id="downloadBtn"
class="tool-btn"
style="display:none;"
download="VortexHelp-Image-to-PDF.pdf">

Download PDF

</a>

<p id="result"></p>
